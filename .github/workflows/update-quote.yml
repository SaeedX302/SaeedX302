
name: Update Quote in README

on:
  schedule:
    # This runs every 5 minutes to avoid rate limiting
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write  # This allows the workflow to write to repository contents

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Fetch new quote and update README
      run: |
        # Fetch quote from your API with error handling
        echo "Fetching quote from API..."
        QUOTE_DATA=$(curl -s -f "https://tsunquotes.vercel.app/quotes" || echo '{"quote":"Code is poetry.","author":"Anonymous"}')
        echo "API Response: $QUOTE_DATA"
        
        # Extract quote and author with fallback
        QUOTE=$(echo "$QUOTE_DATA" | jq -r '.quote // "Code is poetry."')
        AUTHOR=$(echo "$QUOTE_DATA" | jq -r '.author // "Anonymous"')
        
        echo "Quote: $QUOTE"
        echo "Author: $AUTHOR"

        # URL encode the quote and author for the image URL
        ENCODED_QUOTE=$(echo "$QUOTE" | jq -sRr @uri)
        ENCODED_AUTHOR=$(echo "$AUTHOR" | jq -sRr @uri)

        # Create the new image URL
        NEW_QUOTE_URL="https://quotes-github-readme.vercel.app/api?type=horizontal&theme=tokyonight&quote=${ENCODED_QUOTE}&author=${ENCODED_AUTHOR}"
        echo "New Quote URL: $NEW_QUOTE_URL"

        # Update README.md - find the exact pattern and replace it
        sed -i "s|<img src=\"https://quotes-github-readme\.vercel\.app/api[^\"]*\"|<img src=\"$NEW_QUOTE_URL\"|" README.md
        
        echo "README updated successfully"

    - name: Commit and push changes
      run: |
        git config --local user.email "tsuncca19@gmail.com"
        git config --local user.name "༯𝙎ค૯𝙀𝘿✘🫀"
        git add README.md

        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Auto-update quote from tsunquotes API"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
