name: Update README Quote 📝

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  update-readme:
    name: Update README with new quote
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Get new quote and update README 🚀
        env:
          # FORMATTED_QUOTE ko yahan define kar rahe hain taake perl script access kar sake
          FORMATTED_QUOTE: "<i>❝ $(curl -s https://tsunquotes.vercel.app/quotes | jq -r .quote) ❞</i><br>— <b>$(curl -s https://tsunquotes.vercel.app/quotes | jq -r .author)</b>"
        run: |
          # Markers define kar rahe hain
          START_MARKER=""
          END_MARKER=""
          
          # Perl one-liner jo safely content replace karega
          # Ye sirf markers ke beech ka content badlega
          perl -i -p0e "s/($START_MARKER\s*).*?(\s*$END_MARKER)/\$1\n$ENV{FORMATTED_QUOTE}\n\$2/s" README.md

      - name: Commit and push if changed 💾
        run: |
          git config --global user.name "〆༯𝙎คAEED✘🫀"
          git config --global user.email "tsuncca19@gmail.com"
          git add README.md
          
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit. ✅"
          else
            git commit -m "chore(bot): ✨ Update quote of the moment"
            git push
            echo "README updated successfully. 🚀"
          fi
