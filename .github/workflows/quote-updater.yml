name: Update README Quote 📝

on:
  # Manual run ke liye
  workflow_dispatch:
  # Har 5 minute pe run hoga
  schedule:
    - cron: "*/5 * * * *"

jobs:
  update-readme:
    name: Update README with new quote
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Get new quote and update README 🚀
        run: |
          # API se JSON fetch karein
          QUOTE_JSON=$(curl -s "https://tsunquotes.vercel.app/quotes")
          # jq ka use karke quote aur author extract karein
          QUOTE_TEXT=$(echo $QUOTE_JSON | jq -r .quote)
          QUOTE_AUTHOR=$(echo $QUOTE_JSON | jq -r .author)
          # README mein inject karne ke liye content format karein
          FORMATTED_QUOTE="<i>❝ $QUOTE_TEXT ❞</i><br>— <b>$QUOTE_AUTHOR</b>"
          
          # awk command se README file mein content replace karein
          # Ye command aur ke beech ka content update karega
          awk -v quote="$FORMATTED_QUOTE" '
            BEGIN {p=1}
            // {print; print quote; p=0}
            // {p=1}
            p {print}
          ' README.md > README.md.tmp && mv README.md.tmp README.md

      - name: Commit and push if changed 💾
        run: |
          git config --global user.name "༯𝙎ค૯𝙀𝘿✘🫀"
          git config --global user.email "tsuncca19@gmail.com"
          git add README.md
          # Sirf tab commit karega jab file mein koi change hoga
          git diff --staged --quiet || git commit -m "chore(bot): ✨ Update quote of the moment"
          git push
